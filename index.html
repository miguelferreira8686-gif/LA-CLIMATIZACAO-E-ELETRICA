<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>LA CLIMATIZAÇÃO E ELÉTRICA</title>
<link rel="stylesheet" href="style.css">

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
</head>
<body>

<header>
  <h1>LA CLIMATIZAÇÃO E ELÉTRICA</h1>
  <p>Sistema de Controle</p>
</header>

<div class="dashboard">

<div class="card">
<h2>Lançar Pedido</h2>

<input type="text" id="cliente" placeholder="Cliente">
<input type="text" id="servico" placeholder="Serviço">
<input type="number" id="valorPedido" placeholder="Valor">

<select id="responsavel">
<option>Antônio</option>
<option>Lucas</option>
</select>

<select id="status">
<option>Pendente</option>
<option>Pago</option>
</select>

<input type="date" id="dataPedido">

<button onclick="addPedido()" id="btnPedido">Adicionar Pedido</button>

<ul id="listaPedidos"></ul>
</div>

<div class="card">
<h2>Gastos</h2>

<input type="text" id="descGasto" placeholder="Descrição">
<input type="number" id="valorGasto" placeholder="Valor">

<select id="quemPagou">
<option>Antônio</option>
<option>Lucas</option>
</select>

<input type="date" id="dataGasto">

<button onclick="addGasto()">Adicionar Gasto</button>

<ul id="listaGastos"></ul>
</div>

</div>

<!-- RESUMO -->
<div class="resumo">
<h2>Resumo Financeiro</h2>

<div class="resumo-grid">
  <div class="box green">
    <p>Faturamento</p>
    <h3>R$ <span id="fat">0.00</span></h3>
  </div>

  <div class="box red">
    <p>Gastos</p>
    <h3>R$ <span id="gasto">0.00</span></h3>
  </div>

  <div class="box blue">
    <p>Líquido</p>
    <h3>R$ <span id="liq">0.00</span></h3>
  </div>
</div>

<h3 style="margin-top:20px;">Divisão</h3>

<div class="resumo-grid">
  <div class="box">
    <p>Antônio</p>
    <h3>R$ <span id="antonio">0.00</span></h3>
  </div>

  <div class="box">
    <p>Lucas</p>
    <h3>R$ <span id="lucas">0.00</span></h3>
  </div>
</div>
</div>

<!-- PESQUISA -->
<div class="card" style="margin:20px;">
<h2>Pesquisar Serviços Pagos</h2>

<input type="text" id="buscaCliente" placeholder="Nome do cliente">
<input type="date" id="buscaData">

<button onclick="pesquisar()">Pesquisar</button>

<ul id="resultadoBusca"></ul>
</div>

<script src="script.js"></script>
</body>
</html>
